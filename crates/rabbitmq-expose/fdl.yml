functions:
  oscar:
  - oscar-broker:
      name: rabbitmq-service
      image: vrodben1/rabbitmq-expose:0.0.3
      memory: 2Gi
      cpu: '1.0'
      script: script.sh
      expose:
        min_scale: 1
        max_scale: 1
        api_port: [15672, 1883,5672]  
        cpu_threshold: 80     
        default_command: false 
        rewrite_target: false
        nodePort: [0,0,0]
      environment:
        variables:
          BATCH_SIZE: "10"
          MINIO_ENDPOINT: "https://minio.cluster.com"
          BUCKET: "oscar-test"
        secrets:
          MINIO_ACCESS: "user"
          MINIO_SECRET: "pass"
